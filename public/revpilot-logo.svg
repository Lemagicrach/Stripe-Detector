<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#162040"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="80" y1="360" x2="430" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="256" y1="140" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#1E3A8A" stroke-width="1" opacity="0.25">
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="352" x2="512" y2="352"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="352" y1="0" x2="352" y2="512"/>
  </g>

  <!-- Area fill under line -->
  <polygon
    points="90,370 160,320 235,338 310,268 380,228 430,158 430,430 90,430"
    fill="url(#areaGrad)"/>

  <!-- Main revenue trend line -->
  <polyline
    points="90,370 160,320 235,338 310,268 380,228 430,158"
    stroke="url(#lineGrad)" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glowBlue)"/>

  <!-- Leak detection node (red — anomaly on the line) -->
  <circle cx="235" cy="338" r="36" fill="#EF4444" fill-opacity="0.08"/>
  <circle cx="235" cy="338" r="24" fill="#EF4444" fill-opacity="0.15"/>
  <circle cx="235" cy="338" r="13" fill="#EF4444" filter="url(#glowRed)"/>

  <!-- Recovery / current high point (green) -->
  <circle cx="430" cy="158" r="26" fill="#10B981" fill-opacity="0.12"/>
  <circle cx="430" cy="158" r="13" fill="#10B981" filter="url(#glowGreen)"/>

  <!-- Compass tick marks on edge ring -->
  <g stroke="#3B82F6" stroke-width="2" opacity="0.4">
    <line x1="256" y1="30" x2="256" y2="52"/>
    <line x1="256" y1="460" x2="256" y2="482"/>
    <line x1="30" y1="256" x2="52" y2="256"/>
    <line x1="460" y1="256" x2="482" y2="256"/>
  </g>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" stroke="#1E40AF" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>

  <!-- Pilot needle (compass pointing toward recovery) -->
  <line x1="256" y1="256" x2="410" y2="178"
    stroke="#60A5FA" stroke-width="3"
    stroke-linecap="round" opacity="0.6"/>
  <circle cx="256" cy="256" r="6" fill="#3B82F6"/>

  <!-- "RP" monogram in center (subtle) -->
  <text x="256" y="270" text-anchor="middle"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="48" font-weight="800" fill="white" opacity="0.07"
    letter-spacing="2">RP</text>
</svg>
